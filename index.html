<!doctype html>
<html lang="en">
  <head>
    <!-- Production-safe extension error filtering -->
    <script>
    (function(){
      // Only filter known extension noise in development; never suppress in production
      if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return;

      var blockedPatterns = [
        'runtime.lastError','content_script','chrome-extension','moz-extension',
        'safari-extension','Sentry','sentry.io'
      ];

      function isExtensionNoise(args) {
        var str = Array.from(args).map(function(a){return String(a)}).join(' ');
        return blockedPatterns.some(function(p){return str.includes(p)});
      }

      var origError = console.error;
      console.error = function(){
        if (!isExtensionNoise(arguments)) origError.apply(console, arguments);
      };
    })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192x192.svg" />

    <!-- Google Fonts: Syne + Manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Viewport for fullscreen PWA with address bar hide on scroll -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <!-- Theme colors -->
    <meta name="theme-color" content="#F8F9FA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />

    <!-- App description -->
    <meta name="description" content="Discover local markets, events and happenings near you" />
    <meta name="apple-mobile-web-app-title" content="Fomo" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fomo — Discover Local Events" />
    <meta property="og:description" content="Discover local markets, events and happenings near you" />
    <meta property="og:image" content="/icon-512x512.svg" />
    <meta property="og:url" content="https://fomoza.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fomo — Discover Local Events" />
    <meta name="twitter:description" content="Discover local markets, events and happenings near you" />
    <meta name="twitter:image" content="/icon-512x512.svg" />

    <title>Fomo</title>

    <!-- Force cache refresh -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fomo" />

    <!-- iOS Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192x192.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.svg" />
    <link rel="apple-touch-startup-image" href="/splash-screen.svg" />

    <!-- Android/Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Fomo" />

    <!-- Fullscreen mode -->
    <meta name="display-mode" content="standalone" />

    <!-- Safari Pinned Tab -->
    <link rel="mask-icon" href="/icon-192x192.svg" color="#C75B39" />

    <style>
      /* Reset and base styles */
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      /* Full viewport height accounting for mobile browser chrome
         Using min-height allows content to grow and trigger address bar hiding */
      html {
        min-height: 100%;
        min-height: 100dvh;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        min-height: 100dvh;
        overflow-x: hidden;
        touch-action: manipulation;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100%;
        min-height: 100dvh;
        overflow-x: hidden;
      }

      /* Prevent zoom on input focus iOS */
      input, textarea, select {
        font-size: 16px !important;
        touch-action: manipulation;
      }

      /* Smooth scroll behavior */
      html {
        scroll-behavior: smooth;
      }

      /* Hide scrollbar but allow scrolling */
      ::-webkit-scrollbar {
        display: none;
      }

      /* Selection color */
      ::selection {
        background: #C75B39;
        color: white;
      }

      /* Skip Link for Accessibility */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #000;
        color: #fff;
        padding: 8px 16px;
        text-decoration: none;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        z-index: 9999;
        border-radius: 0 0 4px 0;
        transition: top 0.2s;
      }

      .skip-link:focus {
        top: 0;
        outline: 2px solid #fff;
        outline-offset: -2px;
      }

      /* Reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Focus visible styles */
      :focus-visible {
        outline: 2px solid #E85D3F;
        outline-offset: 2px;
      }

      /* High contrast mode adjustments */
      @media (prefers-contrast: more) {
        * {
          border-color: currentColor !important;
        }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Force service worker update -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (let registration of registrations) {
              registration.update();
            }
          });
        }
      })();
    </script>
  </body>
</html>
