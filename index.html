<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F0EDE6" />
    <meta name="description" content="Discover local markets, events and happenings near you" />
    <title>Fomo Markets - Local Events & Markets</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fomo Markets" />
    <link rel="apple-touch-icon" href="/icon-192x192.svg" />

    <!-- Android/Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Safari Pinned Tab -->
    <link rel="mask-icon" href="/vite.svg" color="#E8783A" />

    <style>
      /* Prevent mobile keyboard from pushing content */
      html, body {
        height: 100%;
        overflow: hidden;
        touch-action: manipulation;
      }
      #root {
        height: 100%;
        overflow: hidden;
      }
      /* Prevent zoom on input focus iOS */
      input, textarea, select {
        font-size: 16px !important;
      }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
