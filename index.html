<!doctype html>
<html lang="en">
  <head>
    <!-- AGGRESSIVE extension error suppression -->
    <script>
    (function(){
      var blockedPatterns = [
        'runtime.lastError','content_script','content.js','read.js','lockdown-install',
        'Sentry','sentry.io','429','insights whitelist','UsernameElement',
        'Host validation failed','Host is not supported','SES Removing',
        'unpermitted intrinsics','FrameDoesNotExist','FrameIsBrowserFrame',
        'DelayedMessageSender','TabMonitor','background.js','kins_content',
        'processInputEvent','Cannot read properties of null'
      ];
      var blockedUrls = ['sentry.io','chrome-extension','moz-extension','safari-extension'];

      function shouldBlock(args) {
        var str = Array.from(args).map(function(a){return String(a)}).join(' ');
        return blockedPatterns.some(function(p){return str.includes(p)});
      }

      var origError = console.error;
      var origWarn = console.warn;
      var origLog = console.log;
      var origInfo = console.info;

      console.error = function(){ if(!shouldBlock(arguments)) origError.apply(console,arguments); };
      console.warn = function(){ if(!shouldBlock(arguments)) origWarn.apply(console,arguments); };
      console.log = function(){ if(!shouldBlock(arguments)) origLog.apply(console,arguments); };
      console.info = function(){ if(!shouldBlock(arguments)) origInfo.apply(console,arguments); };

      window.onerror = function(){ return true; };
      window.onunhandledrejection = function(e){ e.preventDefault(); return true; };

      window.addEventListener('error', function(e){ e.preventDefault(); e.stopPropagation(); }, true);
      window.addEventListener('unhandledrejection', function(e){ e.preventDefault(); e.stopPropagation(); }, true);

      // Block fetch to sentry
      var origFetch = window.fetch;
      window.fetch = function(url,opts){
        var urlStr = String(url);
        if(blockedUrls.some(function(u){return urlStr.includes(u)})){
          return Promise.resolve(new Response('{}',{status:200}));
        }
        return origFetch.apply(this,arguments);
      };
    })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Viewport for fullscreen PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- Theme colors -->
    <meta name="theme-color" content="#F7F3EE" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />

    <!-- App description -->
    <meta name="description" content="Discover local markets, events and happenings near you" />
    <meta name="apple-mobile-web-app-title" content="Fomo" />

    <title>Fomo</title>

    <!-- Force cache refresh -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fomo" />

    <!-- iOS Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192x192.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.svg" />
    <link rel="apple-touch-startup-image" href="/splash-screen.svg" />

    <!-- Android/Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Fomo" />

    <!-- Fullscreen mode -->
    <meta name="display-mode" content="standalone" />

    <!-- Safari Pinned Tab -->
    <link rel="mask-icon" href="/vite.svg" color="#C75B39" />

    <style>
      /* Reset and base styles */
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      /* Full viewport height accounting for mobile browser chrome */
      html {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        margin: 0;
        padding: 0;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: manipulation;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
      }

      /* Prevent zoom on input focus iOS */
      input, textarea, select {
        font-size: 16px !important;
        touch-action: manipulation;
      }

      /* Smooth scroll behavior */
      html {
        scroll-behavior: smooth;
      }

      /* Hide scrollbar but allow scrolling */
      ::-webkit-scrollbar {
        display: none;
      }

      /* Selection color */
      ::selection {
        background: #C75B39;
        color: white;
      }

      /* Skip Link for Accessibility */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #000;
        color: #fff;
        padding: 8px 16px;
        text-decoration: none;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        z-index: 9999;
        border-radius: 0 0 4px 0;
        transition: top 0.2s;
      }

      .skip-link:focus {
        top: 0;
        outline: 2px solid #fff;
        outline-offset: -2px;
      }

      /* Reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Focus visible styles */
      :focus-visible {
        outline: 2px solid #E85D3F;
        outline-offset: 2px;
      }

      /* High contrast mode adjustments */
      @media (prefers-contrast: more) {
        * {
          border-color: currentColor !important;
        }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Force service worker update -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (let registration of registrations) {
              registration.update();
            }
          });
        }
      })();
    </script>
  </body>
</html>
